<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recycling Mark Generator — Creative Creatures</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;color:#1a1a1a;font-size:13px}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:#2e7d8a;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.header-title{font-size:15px;font-weight:600;letter-spacing:.3px}
.header-sub{font-size:10px;opacity:.7;margin-top:1px}
.nav{display:flex;gap:5px}
.nav-btn{padding:5px 14px;border-radius:4px;border:none;cursor:pointer;font-size:12px;font-weight:500;background:rgba(255,255,255,.15);color:#fff;transition:background .15s}
.nav-btn.active{background:#fff;color:#2e7d8a}
.body{display:flex;flex:1;overflow:hidden}
.sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid #e5e7eb;overflow-y:auto;padding:14px}
.content{flex:1;overflow-y:auto;padding:20px;background:#f0f2f5}
.sec-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:#6b7280;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sec-label .count{font-weight:400;font-size:11px;color:#9ca3af;text-transform:none;letter-spacing:0}
.input-field{width:100%;padding:7px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;margin-bottom:8px;outline:none;background:#fff;color:#1a1a1a}
.input-field:focus{border-color:#3d9aaa;box-shadow:0 0 0 2px rgba(61,154,170,.15)}
.mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-bottom:14px}
.mat-btn{padding:4px 6px;border-radius:4px;border:1px solid #e5e7eb;background:#fafafa;color:#374151;font-size:10px;cursor:pointer;text-align:left;line-height:1.35;width:100%;transition:all .1s}
.mat-btn:hover{background:#f3f4f6;border-color:#d1d5db}
.mat-btn.sel-r{border-color:#1D9E75;background:#E1F5EE;color:#085041;font-weight:600}
.mat-btn.sel-n{border-color:#d97706;background:#fef3e0;color:#92400e;font-weight:600}
.check-btn{width:100%;padding:9px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;transition:background .15s}
.check-btn.active{background:#2e7d8a;color:#fff}
.check-btn.inactive{background:#d1d5db;color:#9ca3af;cursor:not-allowed}
.clear-btn{width:100%;padding:6px;background:transparent;color:#6b7280;border:1px solid #e5e7eb;border-radius:6px;font-size:11px;cursor:pointer}
.clear-btn:hover{background:#f3f4f6}
.result-card{background:#fff;border-radius:8px;padding:20px;border:1px solid #e5e7eb;min-height:200px}
.result-empty{color:#9ca3af;font-size:13px;text-align:center;padding:60px 20px}
.alert{border-radius:6px;padding:12px 14px;margin-bottom:12px}
.alert-green{background:#E1F5EE;border:1px solid #5DCAA5}
.alert-amber{background:#fef3e0;border:1px solid #f59e0b}
.alert-blue{background:#EFF6FF;border:1px solid #93C5FD}
.alert-title{font-size:13px;font-weight:600;margin-bottom:3px}
.alert-green .alert-title{color:#085041}
.alert-amber .alert-title{color:#92400e}
.alert-blue .alert-title{color:#1e40af}
.alert-sub{font-size:11px}
.alert-green .alert-sub{color:#0F6E56}
.alert-amber .alert-sub{color:#78350f}
.alert-blue .alert-sub{color:#3b82f6}
.tag-r{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;background:#E1F5EE;color:#085041;margin:1px}
.tag-n{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;background:#fef3e0;color:#92400e;margin:1px}
.materials-row{font-size:11px;color:#6b7280;margin-bottom:5px}
.dl-row{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.dl-btn{padding:7px 14px;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s}
.dl-btn:hover{opacity:.85}
.dl-btn:disabled{opacity:.5;cursor:wait}
.dl-teal{background:#2e7d8a;color:#fff}
.dl-brown{background:#633806;color:#fff}
.dl-status{font-size:11px;color:#6b7280;min-height:16px;margin:4px 0 8px}
.generate-btn{padding:9px 20px;background:#2e7d8a;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
.generate-btn:hover{background:#247a86}
.generate-btn:disabled{background:#9ca3af;cursor:wait}
.divider{border-top:1px solid #f0f0f0;margin:14px 0}
.preview-tabs{display:flex;gap:4px;margin-bottom:10px}
.prev-tab{padding:5px 12px;border-radius:4px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;font-size:11px;font-weight:500;cursor:pointer}
.prev-tab.active{background:#3d9aaa;color:#fff;border-color:#3d9aaa}
.preview-box{background:#fafafa;border:1px solid #e5e7eb;border-radius:6px;padding:16px;min-height:80px;display:flex;align-items:center;justify-content:center;overflow:auto;margin-bottom:10px}
.hist-view{padding:20px;background:#f0f2f5;flex:1;overflow-y:auto}
.hist-search{width:100%;max-width:320px;padding:7px 9px;border:1px solid #d1d5db;border-radius:5px;font-size:12px;margin-bottom:12px;outline:none}
.hist-search:focus{border-color:#3d9aaa}
table{width:100%;border-collapse:collapse;font-size:11px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb}
th{padding:8px 10px;background:#2e7d8a;color:#fff;text-align:left;font-size:10px;font-weight:600}
td{padding:6px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Recycling Mark Generator</div>
      <div class="header-sub">Creative Creatures &middot; FR &middot; UK &middot; IT</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div style="text-align:right">
        <div id="online-indicator" style="font-size:10px;color:#6b7280">&#9679; Offline — history not shared</div>
        <div id="auth-status" style="font-size:10px;color:#6b7280;min-height:14px"></div>
      </div>
      <button id="signin-btn" onclick="connectOneDrive()" style="padding:5px 12px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:4px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap">Connect OneDrive</button>
      <div class="nav">
        <button class="nav-btn active" id="nav-gen" onclick="switchView('gen')">Generate</button>
        <button class="nav-btn" id="nav-hist" onclick="switchView('hist')">History (106)</button>
      </div>
    </div>
  </div>

  <!-- Generate view -->
  <div class="body" id="view-gen">
    <div class="sidebar">
      <div style="margin-bottom:14px">
        <div class="sec-label">Reference code</div>
        <input class="input-field" id="inp-ref" type="text" placeholder="e.g. HMDFB510H" oninput="this.value=this.value.toUpperCase();updateUI()">
        <input class="input-field" id="inp-brand" type="text" placeholder="Brand (optional)">
      </div>

      <div style="margin-bottom:4px">
        <div class="sec-label">Recyclable <span class="count" id="r-count">0</span></div>
      </div>
      <div class="mat-grid" id="r-grid"></div>

      <div style="margin-bottom:4px">
        <div class="sec-label">Non-recyclable <span class="count" id="n-count">0</span></div>
      </div>
      <div class="mat-grid" id="n-grid"></div>

      <button class="check-btn inactive" id="check-btn" onclick="checkCombo()">Check combination</button>
      <button class="clear-btn" onclick="clearAll()">Clear selection</button>
    </div>

    <div class="content">
      <div class="result-card" id="result-panel">
        <div class="result-empty">Select materials and enter a ref code,<br>then click <strong>Check combination</strong></div>
      </div>
    </div>
  </div>

  <!-- History view -->
  <div class="hist-view" id="view-hist" style="display:none">
    <input class="hist-search" type="text" placeholder="Search by ref, brand or material&hellip;" oninput="filterHist(this.value)">
    <table id="hist-table">
      <thead>
        <tr>
          <th style="width:100px">Ref</th>
          <th style="width:90px">Brand</th>
          <th>Recyclable</th>
          <th>Non-recyclable</th>
          <th style="width:85px">Type</th>
        </tr>
      </thead>
      <tbody id="hist-body"></tbody>
    </table>
  </div>
</div>

// ── Microsoft Auth + OneDrive Sync ──────────────────────────────────────────
const MSAL_CONFIG = {
  auth: {
    clientId: '52f1bd10-461a-46b4-9289-274a2960f57b',
    authority: 'https://login.microsoftonline.com/f40ab34c-bc36-436c-a649-8c55f57fa17b',
    redirectUri: window.location.href.split('?')[0],
  },
  cache: { cacheLocation: 'sessionStorage' }
};

const GRAPH_SCOPES = ['Files.ReadWrite', 'User.Read'];
const DB_FILENAME  = 'recycling-marks-db.json';

let msalInstance = null;
let odAccount    = null;
let dbFileId     = null;   // OneDrive item ID once found/created
let onlineMode   = false;

async function initMSAL() {
  // Dynamically load MSAL from CDN
  await new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js';
    s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
  msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
  await msalInstance.initialize();

  // Check if we already have an account cached
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    odAccount = accounts[0];
    return true;
  }
  return false;
}

async function signIn() {
  try {
    setAuthStatus('Signing in…', 'info');
    const result = await msalInstance.loginPopup({ scopes: GRAPH_SCOPES });
    odAccount = result.account;
    return true;
  } catch(e) {
    setAuthStatus('Sign-in cancelled or failed: ' + e.message, 'err');
    return false;
  }
}

async function getToken() {
  try {
    const result = await msalInstance.acquireTokenSilent({
      scopes: GRAPH_SCOPES, account: odAccount
    });
    return result.accessToken;
  } catch(e) {
    // Silent failed — try popup
    const result = await msalInstance.acquireTokenPopup({ scopes: GRAPH_SCOPES });
    return result.accessToken;
  }
}

async function graphGet(path) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!r.ok) throw new Error('Graph GET ' + path + ' failed: ' + r.status);
  return r.json();
}

async function graphPut(path, body, contentType='application/json') {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, {
    method: 'PUT',
    headers: { Authorization: 'Bearer ' + token, 'Content-Type': contentType },
    body: typeof body === 'string' ? body : JSON.stringify(body)
  });
  if (!r.ok) throw new Error('Graph PUT failed: ' + r.status);
  return r.json();
}

async function loadFromOneDrive() {
  try {
    // Try to find existing file
    const result = await graphGet('/me/drive/root:/' + DB_FILENAME);
    dbFileId = result.id;
    // Download content
    const token = await getToken();
    const r = await fetch(result['@microsoft.graph.downloadUrl'] || 
      'https://graph.microsoft.com/v1.0/me/drive/items/' + dbFileId + '/content', {
      headers: { Authorization: 'Bearer ' + token }
    });
    const data = await r.json();
    return data.combinations || [];
  } catch(e) {
    if (e.message.includes('404') || e.message.includes('itemNotFound')) {
      // File doesn't exist yet — create it with seed data
      await saveToOneDrive([]);
      return [];
    }
    throw e;
  }
}

async function saveToOneDrive(combinations) {
  const content = JSON.stringify({ combinations, updated: new Date().toISOString() }, null, 2);
  const result = await graphPut(
    '/me/drive/root:/' + DB_FILENAME + ':/content',
    content, 'application/json'
  );
  dbFileId = result.id;
}

async function appendToOneDrive(newCombo) {
  try {
    // Read current, append, write back
    const current = await loadFromOneDrive();
    current.push(newCombo);
    await saveToOneDrive(current);
    return true;
  } catch(e) {
    console.error('OneDrive write failed:', e);
    return false;
  }
}

function setAuthStatus(msg, type) {
  const el = document.getElementById('auth-status');
  if (!el) return;
  el.textContent = msg;
  el.style.color = type === 'err' ? '#dc2626' : type === 'ok' ? '#0F6E56' : '#6b7280';
}

function setOnlineIndicator(online, username) {
  const ind = document.getElementById('online-indicator');
  const btn = document.getElementById('signin-btn');
  if (!ind) return;
  if (online) {
    ind.innerHTML = '&#9679; Syncing with OneDrive' + (username ? ' · ' + username : '');
    ind.style.color = '#0F6E56';
    if (btn) btn.style.display = 'none';
  } else {
    ind.innerHTML = '&#9679; Offline — history not shared';
    ind.style.color = '#6b7280';
    if (btn) btn.style.display = 'inline-block';
  }
}

async function connectOneDrive() {
  const btn = document.getElementById('signin-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Connecting…'; }
  try {
    await initMSAL();
    const alreadyIn = msalInstance.getAllAccounts().length > 0;
    if (!alreadyIn) {
      const ok = await signIn();
      if (!ok) {
        if (btn) { btn.disabled = false; btn.textContent = 'Connect OneDrive'; }
        return;
      }
    }
    onlineMode = true;
    setAuthStatus('Loading history from OneDrive…', 'info');
    const remote = await loadFromOneDrive();
    // Merge remote into sess (dedup by ref)
    const existingRefs = new Set([...COMBOS.map(c=>c.ref), ...sess.map(c=>c.ref)]);
    const newFromRemote = remote.filter(c => !existingRefs.has(c.ref));
    sess.push(...newFromRemote);
    updateHistCount();
    setOnlineIndicator(true, odAccount?.username);
    setAuthStatus('', 'ok');
    renderHist('');
  } catch(e) {
    setAuthStatus('Connection failed: ' + e.message, 'err');
    if (btn) { btn.disabled = false; btn.textContent = 'Connect OneDrive'; }
  }
}

function updateHistCount() {
  const btn = document.getElementById('nav-hist');
  if (btn) btn.textContent = 'History (' + (COMBOS.length + sess.length) + ')';
}

// State
let rSel = [], nSel = [], sess = [], activeCombo = null;

// Build material grids
const RK = Object.keys(MAT).filter(k => k.startsWith('Icon_R_'));
const NK = Object.keys(MAT).filter(k => k.startsWith('Icon_N_'));

RK.forEach(k => {
  const b = document.createElement('button');
  b.className = 'mat-btn'; b.textContent = MAT[k].label; b.dataset.k = k;
  b.onclick = () => { rSel = rSel.includes(k) ? rSel.filter(x=>x!==k) : [...rSel,k]; updateUI(); };
  document.getElementById('r-grid').appendChild(b);
});
NK.forEach(k => {
  const b = document.createElement('button');
  b.className = 'mat-btn'; b.textContent = MAT[k].label; b.dataset.k = k;
  b.onclick = () => { nSel = nSel.includes(k) ? nSel.filter(x=>x!==k) : [...nSel,k]; updateUI(); };
  document.getElementById('n-grid').appendChild(b);
});

function updateUI() {
  document.querySelectorAll('.mat-btn').forEach(b => {
    const k = b.dataset.k;
    b.className = 'mat-btn' + (rSel.includes(k) ? ' sel-r' : nSel.includes(k) ? ' sel-n' : '');
  });
  document.getElementById('r-count').textContent = rSel.length;
  document.getElementById('n-count').textContent = nSel.length;
  const ok = rSel.length > 0;
  const cb = document.getElementById('check-btn');
  cb.className = 'check-btn ' + (ok ? 'active' : 'inactive');
  cb.disabled = !ok;
}

document.getElementById('inp-ref').addEventListener('keydown', e => {
  if (e.key === 'Enter' && rSel.length > 0) checkCombo();
});

function clearAll() {
  rSel = []; nSel = []; activeCombo = null;
  document.getElementById('inp-ref').value = '';
  document.getElementById('inp-brand').value = '';
  document.getElementById('result-panel').innerHTML = '<div class="result-empty">Select materials and enter a ref code,<br>then click <strong>Check combination</strong></div>';
  updateUI();
}

function switchView(v) {
  document.getElementById('view-gen').style.display = v === 'gen' ? 'flex' : 'none';
  document.getElementById('view-hist').style.display = v === 'hist' ? 'flex' : 'none';
  document.getElementById('nav-gen').className = 'nav-btn' + (v==='gen' ? ' active' : '');
  document.getElementById('nav-hist').className = 'nav-btn' + (v==='hist' ? ' active' : '');
  if (v === 'hist') renderHist('');
}

function tag(k, isR) {
  return `<span class="${isR ? 'tag-r' : 'tag-n'}">${MAT[k]?.label || k}</span>`;
}

function findComboMatch(r, n) {
  const rs = [...r].sort().join(','), ns = [...n].sort().join(',');
  return [...COMBOS, ...sess].find(c => [...(c.r||[])].sort().join(',') === rs && [...(c.n||[])].sort().join(',') === ns);
}

function findRefMatch(ref) {
  return [...COMBOS, ...sess].find(c => c.ref === ref.toUpperCase());
}

function checkCombo() {
  if (!rSel.length) return;
  const ref = document.getElementById('inp-ref').value.trim().toUpperCase();
  const panel = document.getElementById('result-panel');
  const comboMatch = findComboMatch(rSel, nSel);
  const refMatch = ref ? findRefMatch(ref) : null;

  if (comboMatch) {
    activeCombo = comboMatch;
    const isSameRef = ref && comboMatch.ref === ref;
    panel.innerHTML = `
      <div class="alert alert-green">
        <div class="alert-title">This combination already exists</div>
        <div class="alert-sub">Ref: <strong>${comboMatch.ref}</strong>${comboMatch.brand ? ' &middot; ' + comboMatch.brand : ''}</div>
      </div>
      <div class="materials-row">Recyclable: ${(comboMatch.r||[]).map(k=>tag(k,true)).join(' ')}</div>
      <div class="materials-row">${(comboMatch.n||[]).length ? 'Non-recyclable: '+(comboMatch.n||[]).map(k=>tag(k,false)).join(' ') : '<em style="color:#9ca3af">No non-recyclable materials</em>'}</div>
      <div class="divider"></div>
      <div style="font-size:12px;color:#374151;margin-bottom:6px;font-weight:500">Download files for <strong>${comboMatch.ref}</strong>:</div>
      <div class="dl-status" id="dl-status"></div>
      <div class="dl-row">
        <button class="dl-btn dl-teal" id="dl-fr" onclick="doDownload('fr')">&#8595; FR mark</button>
        <button class="dl-btn dl-teal" id="dl-uk" onclick="doDownload('uk')">&#8595; UK mark</button>
        <button class="dl-btn dl-teal" id="dl-itqr" onclick="doDownload('itqr')">&#8595; IT QR</button>
        <button class="dl-btn dl-brown" id="dl-ithtml" onclick="doDownload('ithtml')">&#8595; IT materials (PDF)</button>
      </div>
      ${!isSameRef && ref ? `
        <div class="divider"></div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:8px">To use this combination under a different ref code (<strong>${ref}</strong>):</div>
        <button class="generate-btn" onclick="doGenerate()">Generate marks for ${ref}</button>
        <div class="dl-status" id="gen-status" style="margin-top:6px"></div>
      ` : ''}
    `;
    return;
  }

  if (refMatch && ref) {
    panel.innerHTML = `
      <div class="alert alert-amber">
        <div class="alert-title">Ref code already in use</div>
        <div class="alert-sub"><strong>${ref}</strong> exists with a different combination</div>
      </div>
      <div class="materials-row">Existing recyclable: ${(refMatch.r||[]).map(k=>tag(k,true)).join(' ')}</div>
      <div class="materials-row">${(refMatch.n||[]).length ? 'Existing non-recyclable: '+(refMatch.n||[]).map(k=>tag(k,false)).join(' ') : ''}</div>
      <div class="divider"></div>
      <div style="font-size:12px;color:#6b7280">Please choose a different ref code for this new combination.</div>
    `;
    return;
  }

  // New combination
  const mixed = nSel.length > 0;
  panel.innerHTML = `
    <div class="alert alert-blue">
      <div class="alert-title">New combination &#8212; no existing match</div>
      <div class="alert-sub">${ref ? `Ready to generate marks for <strong>${ref}</strong>` : 'Enter a ref code above to generate'}</div>
    </div>
    <div class="materials-row">Recyclable: ${rSel.map(k=>tag(k,true)).join(' ')}</div>
    <div class="materials-row">${nSel.length ? 'Non-recyclable: '+nSel.map(k=>tag(k,false)).join(' ') : '<em style="color:#9ca3af">No non-recyclable materials</em>'}</div>
    <div style="font-size:11px;color:#6b7280;margin:6px 0 14px">FR type: <strong>${mixed ? 'Mixed (recyclable + non-recyclable)' : 'Recycle only'}</strong></div>
    ${ref
      ? `<button class="generate-btn" id="gen-btn" onclick="doGenerate()">Generate marks for ${ref}</button>
         <div class="dl-status" id="gen-status" style="margin-top:8px"></div>`
      : `<div style="font-size:12px;color:#9ca3af">Enter a ref code in the sidebar to generate</div>`
    }
  `;
}

function doDownload(fileType) {
  const btn = document.getElementById('dl-' + fileType);
  const status = document.getElementById('dl-status');
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Building…'; }
  if (status) status.textContent = 'Generating file…';

  try {
    const combo = activeCombo;
    const fr = buildFR(combo.r, combo.n);
    const uk = buildUK(combo.r, combo.n);
    const itqr = buildITQR(combo.ref);
    const ithtml = buildITHtml(combo.r, combo.n, combo.ref, fr, uk);
    const files = {fr, uk, itqr, ithtml};
    const names = {fr: combo.ref+'_FR.svg', uk: combo.ref+'_UK.svg', itqr: combo.ref+'_IT_QR.svg', ithtml: combo.ref+'_IT_Materials.html'};
    const mimes = {fr:'image/svg+xml', uk:'image/svg+xml', itqr:'image/svg+xml', ithtml:'text/html'};
    if (fileType === 'ithtml') {
      const win = window.open('', '_blank'); win.document.write(files[fileType]); win.document.close();
    } else { dlBlob(names[fileType], files[fileType], mimes[fileType]); }
    if (status) { status.textContent = '&#10003; Downloaded ' + names[fileType]; setTimeout(() => { if(status) status.textContent=''; }, 3000); }
  } catch(e) {
    if (status) status.textContent = 'Error: ' + e.message;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
  }
}

function doGenerate() {
  const ref = document.getElementById('inp-ref').value.trim().toUpperCase();
  const brand = document.getElementById('inp-brand').value.trim();
  if (!ref || !rSel.length) return;

  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('gen-status');
  const orig = btn ? btn.textContent : '';
  if (btn) { btn.disabled = true; btn.textContent = 'Building…'; btn.style.background = '#9ca3af'; }
  if (status) status.textContent = 'Compositing marks…';

  try {
    const fr = buildFR(rSel, nSel);
    const uk = buildUK(rSel, nSel);
    const itqr = buildITQR(ref);
    const ithtml = buildITHtml(rSel, nSel, ref, fr, uk);
    const newCombo = {ref, brand, r:[...rSel], n:[...nSel], createdBy: odAccount?.username||'', date: new Date().toISOString().split('T')[0]};
    sess.push(newCombo);
    updateHistCount();
    if (onlineMode) {
      appendToOneDrive(newCombo).then(ok => {
        setAuthStatus(ok ? '✓ Saved to OneDrive' : '⚠ OneDrive save failed — saved locally only', ok?'ok':'err');
        setTimeout(() => setAuthStatus('','ok'), 3000);
      });
    }
    showGeneratedResult(ref, {fr, uk, itqr, ithtml});
  } catch(e) {
    if (status) status.textContent = 'Error: ' + e.message;
    if (btn) { btn.disabled = false; btn.textContent = orig; btn.style.background = '#2e7d8a'; }
  }
}

function showGeneratedResult(ref, files) {
  const panel = document.getElementById('result-panel');
  panel.innerHTML = `
    <div class="alert alert-green" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div>
        <div class="alert-title">Generated: ${ref}</div>
        <div class="alert-sub">4 files ready to download</div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="dl-btn dl-teal" id="gdl-fr">&#8595; FR mark</button>
        <button class="dl-btn dl-teal" id="gdl-uk">&#8595; UK mark</button>
        <button class="dl-btn dl-teal" id="gdl-itqr">&#8595; IT QR</button>
        <button class="dl-btn dl-brown" id="gdl-ithtml">&#8595; IT materials (PDF)</button>
      </div>
    </div>
    <div class="preview-tabs">
      <button class="prev-tab active" id="pt-fr" onclick="setPTab('fr',this)">FR mark</button>
      <button class="prev-tab" id="pt-uk" onclick="setPTab('uk',this)">UK mark</button>
      <button class="prev-tab" id="pt-itqr" onclick="setPTab('itqr',this)">IT QR</button>
      <button class="prev-tab" id="pt-itpdf" onclick="setPTab('itpdf',this)">IT materials</button>
    </div>
    <div class="preview-box" id="preview-box"></div>
  `;

  const dlMap = {
    fr: [ref+'_FR.svg', 'image/svg+xml'],
    uk: [ref+'_UK.svg', 'image/svg+xml'],
    itqr: [ref+'_IT_QR.svg', 'image/svg+xml'],
    ithtml: [ref+'_IT_Materials.html', 'text/html']
  };
  ['fr','uk','itqr','ithtml'].forEach(t => {
    document.getElementById('gdl-'+t).onclick = () => {
      if (t === 'ithtml') {
        const win = window.open('', '_blank'); win.document.write(files[t]); win.document.close();
      } else { dlBlob(dlMap[t][0], files[t], dlMap[t][1]); }
    };
  });

  let curTab = 'fr';
  function renderPrev() {
    const p = document.getElementById('preview-box');
    if (!p) return;
    if (curTab === 'fr') p.innerHTML = files.fr;
    else if (curTab === 'uk') p.innerHTML = files.uk;
    else if (curTab === 'itqr') p.innerHTML = files.itqr;
    else p.innerHTML = `<iframe srcdoc="${files.ithtml.replace(/"/g,'&quot;')}" style="width:100%;height:320px;border:none"></iframe>`;
  }

  window.setPTab = function(t, btn) {
    curTab = t === 'itpdf' ? 'itpdf' : t;
    document.querySelectorAll('.prev-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPrev();
  };
  renderPrev();
}

function dlBlob(name, content, mime) {
  const b = new Blob([content], {type: mime});
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u; a.download = name; a.click();
  URL.revokeObjectURL(u);
}

// SVG compositing
function em(d, x, y) {
  return `<g transform="translate(${x.toFixed(3)},${y.toFixed(3)})">${d.inner}</g>`;
}
function ys(x, y, w, fh) {
  return `<rect x="${x.toFixed(3)}" y="${y.toFixed(3)}" width="${w}" height="${fh}" fill="#fcc03d"/>` +
         `<rect x="${x.toFixed(3)}" y="${(y+0.7).toFixed(3)}" width="${w}" height="${(fh-1.4).toFixed(2)}" fill="#fff"/>`;
}

function buildFR(rK, nK) {
  const CL=SVG_DATA.Frame_FR_Cap_Left, B=SVG_DATA.Frame_FR_Body,
        CRR=SVG_DATA.Frame_FR_Cap_Right_Recycle, CRM=SVG_DATA.Frame_FR_Cap_Right_Mixed,
        NR=SVG_DATA.Frame_FR_NonRecycle_Body, CRE=SVG_DATA.Frame_FR_Cap_Right_NonRecycle_End,
        P=SVG_DATA.Icon_Plus;
  const FH=B.h, FY=5.3, SW=B.w, PW=10, IS=18.4, mx=nK.length>0;
  const rw = (ks, w) => ks.length*w + Math.max(0,ks.length-1)*PW;
  const tw = CL.w + rw(rK,SW) + (mx ? CRM.w + rw(nK,NR.w) + CRE.w : CRR.w);
  const ps = [`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${tw.toFixed(2)} ${CL.h}">`];
  ps.push(em(CL, 0, 0));
  let x = CL.w; const iy = FY + (FH-IS)/2;
  rK.forEach((k,i) => {
    ps.push(em(B, x, FY));
    const ic = SVG_DATA[k]; if (ic) ps.push(em(ic, x, iy));
    x += SW;
    if (i < rK.length-1) { ps.push(ys(x, FY, PW, FH)); ps.push(em(P, x+(PW-IS)/2, iy)); x += PW; }
  });
  if (!mx) { ps.push(em(CRR, x, FY)); }
  else {
    ps.push(em(CRM, x, FY)); x += CRM.w;
    nK.forEach((k,i) => {
      ps.push(em(NR, x, FY));
      const ic = SVG_DATA[k]; if (ic) ps.push(em(ic, x+0.7, iy));
      x += NR.w;
      if (i < nK.length-1) { ps.push(ys(x, FY, PW, FH)); ps.push(em(P, x+(PW-IS)/2, iy)); x += PW; }
    });
    ps.push(em(CRE, x, FY));
  }
  ps.push('</svg>');
  return ps.join('');
}

function buildUK(rK, nK) {
  const mx = nK.length > 0;
  const CL = SVG_DATA[mx ? 'Frame_UK_Mixed_Cap_Left' : 'Frame_UK_Single_Cap_Left'];
  const CB = SVG_DATA[mx ? 'Frame_UK_Mixed_Cap_Body' : 'Frame_UK_Single_Cap_Body'];
  const CR = SVG_DATA[mx ? 'Frame_UK_Mixed_Cap_Right' : 'Frame_UK_Single_Cap_Right'];
  const H = CL.h, fs = 5.2, font = `font-family="Futura PT,Futura,Arial Black,sans-serif" font-weight="900"`;
  const rT = rK.map(k => MAT[k]?.uk||k).join(', ') + ' recycle';
  const nT = nK.map(k => MAT[k]?.uk||k).join(', ') + " don\u2019t recycle";
  const nt = Math.max(1, Math.ceil((Math.max(rT.length, mx ? nT.length : 0) * 2.8 + 6) / CB.w));
  const bw = nt * CB.w, tw = CL.w + bw + CR.w;
  const ps = [`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${tw.toFixed(2)} ${H}">`];
  ps.push(em(CL, 0, 0));
  for (let i=0; i<nt; i++) ps.push(em(CB, CL.w + i*CB.w, 0));
  ps.push(em(CR, CL.w + bw, 0));
  const tx = CL.w + 2;
  if (!mx) {
    ps.push(`<text x="${tx.toFixed(1)}" y="${(H/2+fs*0.38).toFixed(1)}" ${font} font-size="${fs}" fill="#414042">${rT}</text>`);
  } else {
    const rh = H/2;
    ps.push(`<text x="${tx.toFixed(1)}" y="${(rh/2+fs*0.38).toFixed(1)}" ${font} font-size="${fs}" fill="#414042">${rT}</text>`);
    ps.push(`<text x="${tx.toFixed(1)}" y="${(rh+rh/2+fs*0.38).toFixed(1)}" ${font} font-size="${fs}" fill="#414042">${nT}</text>`);
  }
  ps.push('</svg>');
  return ps.join('');
}

function buildITQR(ref) {
  const code = ref.toUpperCase();
  const d = SVG_DATA.Frame_IT_Base;
  // Rebuild full SVG, keeping defs (needed for textPath), stripping old misplaced text
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 ${d.w} ${d.h}">${d.inner}</svg>`;
  // Remove the original text element (startOffset 240.1% positions it wrong)
  svg = svg.replace(/<text>.*?<\/text>/s, '');
  // Inject correctly positioned text before closing svg tag
  const textEl = `<text><textPath startOffset="81%" xlink:href="#path" href="#path"><tspan fill="#8dc63f" font-family="Mont-Heavy,Mont,Arial Black,Arial,sans-serif" font-size="6.0" font-weight="800" letter-spacing="0.5">${code}</tspan></textPath></text>`;
  svg = svg.replace('</svg>', textEl + '</svg>');
  return svg;
}

function buildITHtml(rK, nK, ref, frSvg, ukSvg) {
  const code = ref.toUpperCase(), all = [...rK, ...nK], n = all.length;
  const RD='#2e7d8a', RM='#3d9aaa', ND='#b8690a', NM='#cc7a10', B='1px solid #fff';
  const cols = all.map(k => {
    const d = MAT[k]||{}, isR = k.startsWith('Icon_R_'), dk = isR?RD:ND, md = isR?RM:NM;
    return `<td style="width:${Math.floor(100/n)}%;padding:0;border-right:${B}">` +
      `<div style="background:${dk};color:#fff;font-size:7pt;font-weight:700;padding:5px 4px;text-align:center;border-bottom:${B}">${d.it||''}</div>` +
      `<div style="background:${md};color:#fff;font-size:7pt;padding:4px;text-align:center;border-bottom:${B}">${d.c||''}</div>` +
      `<div style="background:${md};color:#fff;font-size:7pt;font-weight:700;padding:4px;text-align:center">${d.itm||''}</div></td>`;
  }).join('');
  const fb = btoa(unescape(encodeURIComponent(frSvg)));
  const ub = btoa(unescape(encodeURIComponent(ukSvg)));
  const ukH = nK.length ? 48 : 28;
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><script>window.onload=function(){window.print()}<\/script>
<style>@page{size:A4;margin:18mm}*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}body{font-family:Helvetica,Arial,sans-serif;margin:0}
.ref{text-align:center;font-size:13pt;font-weight:700;letter-spacing:2px;margin-bottom:22px}
.sec{font-size:11pt;font-weight:700;text-align:center;margin:24px 0 12px}
table{width:100%;border-collapse:collapse;border:1.5px solid #888}
.instr{background:${RM};color:#fff;font-size:8.5pt;font-weight:700;text-align:center;padding:7px}
.center{text-align:center}</style></head><body>
<div style="text-align:center;margin-bottom:16px;padding-top:4px"><img src="${FKA_LOGO}" style="height:42px"/></div><div class="ref">${code}</div>
<div class="sec">Istruzioni di riciclaggio per l\u2019Italia</div>
<table><tr>${cols}</tr></table>
<div class="instr">RACCOLTA DIFFERENZIATA</div>
<div class="sec">Instructions de recyclage pour la France</div>
<div class="center"><img src="data:image/svg+xml;base64,${fb}" style="height:30px;max-width:100%"/></div>
<div class="sec">Recycling instructions for the United Kingdom</div>
<div class="center"><img src="data:image/svg+xml;base64,${ub}" style="height:${ukH}px;max-width:100%"/></div>
</body></html>`;
}

function renderHist(q) {
  const all = [...COMBOS, ...sess];
  const f = q ? all.filter(c =>
    c.ref.toLowerCase().includes(q.toLowerCase()) ||
    (c.brand||'').toLowerCase().includes(q.toLowerCase()) ||
    [...(c.r||[]),...(c.n||[])].some(k => MAT[k]?.label.toLowerCase().includes(q.toLowerCase()))
  ) : all;
  document.getElementById('hist-body').innerHTML = f.map(c => `
    <tr>
      <td style="font-weight:600;font-family:monospace">${c.ref}</td>
      <td style="color:#6b7280">${c.brand||'—'}</td>
      <td>${(c.r||[]).map(k=>`<span class="tag-r">${MAT[k]?.label||k}</span>`).join(' ')}</td>
      <td>${(c.n||[]).length ? (c.n||[]).map(k=>`<span class="tag-n">${MAT[k]?.label||k}</span>`).join(' ') : '<span style="color:#d1d5db">—</span>'}</td>
      <td style="font-size:10px;font-weight:600;color:${(c.n||[]).length?'#d97706':'#0F6E56'}">${(c.n||[]).length?'Mixed':'Recycle only'}</td>
    </tr>`).join('');
}

function filterHist(q) { renderHist(q); }

// Auto-connect silently on load (if previously signed in)
window.addEventListener('load', async () => {
  try {
    await initMSAL();
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      odAccount = accounts[0];
      onlineMode = true;
      setOnlineIndicator(true, odAccount.username);
      setAuthStatus('Loading OneDrive history…', 'info');
      const remote = await loadFromOneDrive();
      const existingRefs = new Set([...COMBOS.map(c=>c.ref), ...sess.map(c=>c.ref)]);
      sess.push(...remote.filter(c => !existingRefs.has(c.ref)));
      updateHistCount();
      setAuthStatus('', 'ok');
    }
  } catch(e) {
    // Silent auto-connect failed — that's fine, user can connect manually
    setOnlineIndicator(false);
  }
});
